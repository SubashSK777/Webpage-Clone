<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal Submission Portal</title>
  <meta name="description" content="Academic journal submission portal — Home, Author, and Review access." />

  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161a23;
      --border:    rgba(255,255,255,0.07);
      --accent:    #4f8ef7;
      --accent2:   #a78bfa;
      --text:      #e8eaf0;
      --muted:     #8892a4;
      --radius:    14px;
      --transition: 0.25s ease;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ─── Full-screen iframe ───────────────────────── */
    #page-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg);
      opacity: 0;
      transition: opacity 0.3s ease;
      /* Hidden until a page is loaded */
      display: none;
    }

    #page-frame.visible {
      display: block;
      opacity: 1;
    }

    /* ─── Loader / Splash ──────────────────────────── */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--bg);
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #splash p {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <!-- Loading splash shown while an MHTML page loads -->
  <div id="splash">
    <div class="spinner"></div>
    <p>Loading…</p>
  </div>

  <!-- Full-screen iframe that renders MHTML pages -->
  <iframe id="page-frame" title="Page content" sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>

  <script src="router.js"></script>
</body>
</html>
